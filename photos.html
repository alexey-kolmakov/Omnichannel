<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Фотоархивы</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 40px;
      background: #f7f7f7;
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .tile {
      background: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: .2s ease;
    }

    .tile:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }

    .tile a {
      text-decoration: none;
      color: #0066cc;
      font-size: 18px;
      font-weight: 500;
    }

    .icon {
      font-size: 32px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<h2>Фотоархивы по темам</h2>

<div class="grid">

  <div class="tile">
    <div class="icon">👨‍👩‍👧</div>
    <a href="https://example.com/family">Семейные фото</a>
  </div>

  <div class="tile">
    <div class="icon">✈️</div>
    <a href="https://example.com/travel">Путешествия</a>
  </div>

  <div class="tile">
    <div class="icon">🌿</div>
    <a href="https://example.com/nature">Природа</a>
  </div>

  <div class="tile">
    <div class="icon">🎉</div>
    <a href="https://example.com/events">События</a>
  </div>

  <div class="tile">
    <div class="icon">🧒</div>
    <a href="https://example.com/childhood">Детские фото</a>
  </div>

</div>

</body>
</html>
